<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caculator</title>
</head>
<body>
<h1>Caculator</h1>

    <input type="number" id="num1" width="20">
    <input type="number" id="num2" width="20"><br><br>
    <button onclick="plus()">Addition(+)</button>
    <button onclick="minus()">Subtraction(-)</button>
    <button onclick="times()">Multiplication(*)</button>
    <button onclick="devided()">Division(/)</button>

    <p id="ketqua"></p>


<script>
    function plus() {
        let num1 = Number(document.getElementById("num1").value);
        let num2 = Number(document.getElementById("num2").value);
        let result;
        result = num1 + num2;
        document.getElementById("ketqua").innerHTML =
            "Result Addition: " + result;
    }
</script>
</body>
</html>
