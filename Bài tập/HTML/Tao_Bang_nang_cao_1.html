<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bàn cờ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f9a825;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        table {
            border-collapse: collapse;
        }

        th, td {
            width: 70px;
            height: 70px;
            text-align: center;
            vertical-align: middle;
        }

        .number {
            font-size: 22px;
            font-weight: bold;
            height: 52px;
            padding-top: 10px;
        }

        .letter {
            font-size: 22px;
            font-weight: bold;
            width: 40px;
        }

        .light { background-color: white; }
        .dark  { background-color: black; }
    </style>
</head>
<body>

<table>
    <thead>
    <tr>
        <th class="letter"></th>
        <th class="number">1</th>
        <th class="number">2</th>
        <th class="number">3</th>
        <th class="number">4</th>
        <th class="number">5</th>
        <th class="number">6</th>
        <th class="number">7</th>
        <th class="number">8</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <th class="letter">A</th>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
    </tr>
    <tr>
        <th class="letter">B</th>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
    </tr>
    <tr>
        <th class="letter">C</th>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
    </tr>
    <tr>
        <th class="letter">D</th>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
    </tr>
    <tr>
        <th class="letter">E</th>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
    </tr>
    <tr>
        <th class="letter">F</th>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
    </tr>
    <tr>
        <th class="letter">G</th>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
    </tr>
    <tr>
        <th class="letter">H</th>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
        <td class="light"></td>
        <td class="dark"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
