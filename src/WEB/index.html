<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Huy Shop</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* HEADER */
        header {
            border-bottom: 1px solid #ddd;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
        }

        .logo {
            font-weight: bold;
            font-size: 20px;
        }

        /* GRID */
        .container {
            padding: 30px 40px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        /* CARD */
        .card {}

        .thumb {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 4px;
        }

        .name {
            font-size: 14px;
            margin: 8px 0;
        }

        .price {
            font-weight: bold;
            font-size: 14px;
        }

        button {
            margin-top: 8px;
            width: 100%;
            padding: 8px;
            border: 1px solid black;
            background: white;
            cursor: pointer;
        }

        button:hover {
            background: black;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">HUY</div>
    <div>
        <a href="cart.html">Giỏ hàng (<span id="count">0</span>)</a>
    </div>
</header>

<div class="container">

    <div class="card">
        <img src="image/ao.jpg" class="thumb">
        <div class="name">Áo thun trơn</div>
        <div class="price">120.000đ</div>
        <button onclick="addToCart('Áo thun trơn',120000)">Thêm</button>
    </div>

    <div class="card">
        <img src="image/ao.jpg" class="thumb">
        <div class="name">Áo hoodie</div>
        <div class="price">350.000đ</div>
        <button onclick="addToCart('Áo hoodie',350000)">Thêm</button>
    </div>

    <div class="card">
        <img src="image/ao.jpg" class="thumb">
        <div class="name">Quần jean</div>
        <div class="price">400.000đ</div>
        <button onclick="addToCart('Quần jean',400000)">Thêm</button>
    </div>

    <div class="card">
        <img src="image/ao.jpg" class="thumb">
        <div class="name">Giày sneaker</div>
        <div class="price">500.000đ</div>
        <button onclick="addToCart('Giày sneaker',500000)">Thêm</button>
    </div>

</div>

<script>
    function addToCart(name, price) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        let found = cart.find(item => item.name === name);

        if (found) {
            found.qty++;
        } else {
            cart.push({name, price, qty:1});
        }

        localStorage.setItem("cart", JSON.stringify(cart));
        updateCount();
    }

    function updateCount() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let total = 0;

        cart.forEach(item => total += item.qty);

        document.getElementById("count").innerText = total;
    }

    updateCount();
</script>

</body>
</html>
